// ── HELPERS ───────────────────────────────────────────────────────────────
function precioActual(ing) {
  if (!ing) return null;
  if (ing.precio_actual) return ing.precio_actual;
  if (ing.historial_precios && ing.historial_precios.length)
    return ing.historial_precios[ing.historial_precios.length - 1];
  return null;
}
function fmt$(n) { return n == null ? '—' : '$' + parseFloat(n).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function hoy() { return new Date().toISOString().slice(0,10); }

// ── STOCK ─────────────────────────────────────────────────────────────────
let stockSort = { col: 'nombre', dir: 'asc' };

function setSort(col) {
  if (stockSort.col === col) {
    stockSort.dir = stockSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    stockSort.col = col; stockSort.dir = 'asc';
  }
  renderStock();
}

function vencimientoBadge(venc) {
  if (!venc) return '';
  const hoyMs = new Date().setHours(0,0,0,0);
  const vMs   = new Date(venc).getTime();
  const dias  = Math.round((vMs - hoyMs) / 86400000);
  if (dias < 0)   return `<span class="badge badge-venc-exp">Vencido ${Math.abs(dias)}d</span>`;
  if (dias <= 30) return `<span class="badge badge-venc-warn">Vence en ${dias}d</span>`;
  return `<span class="badge badge-venc-ok">Vence ${venc}</span>`;
}

function renderStock() {
  // Populate category filter
  const catSel = document.getElementById('stock-cat-filter');
  if (catSel) {
    const cur = catSel.value;
    const cats = [...new Set(db.stock.map(s => s.categoria).filter(Boolean))].sort();
    catSel.innerHTML = '<option value="">Todas las categorías</option>' +
      cats.map(c => `<option value="${c}"${cur===c?' selected':''}>${c}</option>`).join('');
  }

  const q      = (document.getElementById('stock-search')||{}).value||'';
  const catF   = (document.getElementById('stock-cat-filter')||{}).value||'';
  const alertas = db.stock.filter(s => s.cantidad <= s.minimo);

  // Filter
  let lista = db.stock.filter(s =>
    (!q || s.nombre.toLowerCase().includes(q.toLowerCase())) &&
    (!catF || s.categoria === catF)
  );

  // Sort
  lista = [...lista].sort((a, b) => {
    let va, vb;
    if (stockSort.col === 'nombre')   { va = a.nombre.toLowerCase(); vb = b.nombre.toLowerCase(); }
    else if (stockSort.col === 'cat') { va = (a.categoria||'').toLowerCase(); vb = (b.categoria||'').toLowerCase(); }
    else if (stockSort.col === 'cant'){ va = a.cantidad; vb = b.cantidad; }
    else if (stockSort.col === 'precio') {
      va = precioActual(a)?.precio_por_unidad ?? -1;
      vb = precioActual(b)?.precio_por_unidad ?? -1;
    }
    else if (stockSort.col === 'venc') {
      va = a.vencimiento || 'z'; vb = b.vencimiento || 'z';
    }
    else if (stockSort.col === 'estado') {
      const rank = s => s.cantidad <= 0 ? 0 : s.cantidad <= s.minimo ? 1 : 2;
      va = rank(a); vb = rank(b);
    }
    if (va < vb) return stockSort.dir === 'asc' ? -1 : 1;
    if (va > vb) return stockSort.dir === 'asc' ? 1 : -1;
    return 0;
  });

  function thSort(col, label) {
    const active = stockSort.col === col;
    const cls = active ? stockSort.dir : '';
    return `<th class="sortable ${cls}" onclick="setSort('${col}')">${label}<span class="sort-arrow"></span></th>`;
  }

  const cont = document.getElementById('stock-content');
  cont.innerHTML = `
    ${alertas.length ? `<div class="alert-banner">⚠ ${alertas.length} ingrediente${alertas.length>1?'s bajos o agotados':'bajo o agotado'}: ${alertas.map(a=>a.nombre).join(', ')}</div>` : ''}
    <div class="card" style="padding:0;overflow:hidden">
      <table class="data-table">
        <thead><tr>
          ${thSort('nombre','Ingrediente')}
          ${thSort('cat','Categoría')}
          ${thSort('cant','Disponible')}
          ${thSort('precio','Precio/unidad')}
          <th>Últ. compra</th>
          ${thSort('venc','Vencimiento')}
          ${thSort('estado','Estado')}
          <th style="text-align:right">Acciones</th>
        </tr></thead>
        <tbody>
        ${lista.length === 0
          ? `<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-light)">Sin resultados</td></tr>`
          : lista.map(s => {
            const pct    = Math.min(100, Math.round((s.cantidad / Math.max(s.cantidad, s.minimo * 2)) * 100));
            const estado  = s.cantidad <= 0 ? 'badge-red' : s.cantidad <= s.minimo ? 'badge-amber' : 'badge-green';
            const label   = s.cantidad <= 0 ? 'Agotado' : s.cantidad <= s.minimo ? 'Bajo' : 'OK';
            const color   = s.cantidad <= 0 ? '#b03030' : s.cantidad <= s.minimo ? '#c07820' : 'var(--green-mid)';
            const pc      = precioActual(s);
            const vencBdg = vencimientoBadge(s.vencimiento);
            return `<tr>
              <td style="font-weight:500">${s.nombre}</td>
              <td><span class="badge badge-gray">${s.categoria||'—'}</span></td>
              <td>
                <div>${s.cantidad} ${s.unidad}</div>
                <div class="progress-wrap" style="width:80px">
                  <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
                </div>
              </td>
              <td style="color:var(--green-deep);font-weight:500">${pc ? fmt$(pc.precio_por_unidad)+' / '+s.unidad : '<span style="color:var(--text-light);font-size:12px">Sin precio</span>'}</td>
              <td style="color:var(--text-mid);font-size:12px">${pc ? `${pc.fecha}<br><span style="color:var(--text-light)">${pc.proveedor||'—'}</span>` : '—'}</td>
              <td>${vencBdg || '<span style="color:var(--text-light);font-size:12px">—</span>'}</td>
              <td><span class="badge ${estado}">${label}</span></td>
              <td><div class="actions">
                <button class="btn btn-sm" style="color:var(--green-mid);border-color:var(--green-mid)" onclick="registrarPrecio(${s.id})">$ Precio</button>
                <button class="btn btn-sm btn-gold" onclick="reponerIngrediente(${s.id})">Reponer</button>
                <button class="btn btn-sm" onclick="openFormIngrediente(db.stock.find(x=>x.id===${s.id}))">Editar</button>
                <button class="btn btn-sm btn-danger" onclick="eliminarIngrediente(${s.id})">✕</button>
              </div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

function registrarPrecio(id) {
  const s = db.stock.find(x => x.id === id);
  if (!s) return;
  if (!s.historial_precios) s.historial_precios = [];
  const pc = precioActual(s);
  showModal(`
    <div class="modal-title">Registrar precio — ${s.nombre}</div>
    <div class="grid2">
      <div><label>Fecha</label><input type="date" id="pp-fecha" value="${hoy()}" /></div>
      <div><label>Proveedor</label><input id="pp-prov" placeholder="Nombre del proveedor" value="${pc ? pc.proveedor||'' : ''}" /></div>
    </div>
    <div class="grid2 mt12">
      <div><label>Cantidad comprada (${s.unidad})</label><input type="number" min="0" step="0.01" id="pp-cant" placeholder="ej: 500" /></div>
      <div><label>Precio total pagado ($)</label><input type="number" min="0" step="0.01" id="pp-total" placeholder="ej: 2500" /></div>
    </div>
    <div class="mt12" style="background:var(--green-xpale);border-radius:var(--radius);padding:12px">
      <div style="font-size:12px;color:var(--text-mid);margin-bottom:4px">Precio por ${s.unidad} calculado:</div>
      <div id="pp-resultado" style="font-size:20px;font-weight:500;color:var(--green-deep)">—</div>
    </div>
    ${s.historial_precios.length ? `
      <div style="margin-top:16px">
        <div style="font-size:12px;font-weight:500;color:var(--text-mid);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Historial de precios</div>
        <table class="data-table" style="font-size:12px">
          <thead><tr><th>Fecha</th><th>Proveedor</th><th>Precio / ${s.unidad}</th></tr></thead>
          <tbody>
          ${[...s.historial_precios].reverse().slice(0,5).map(p=>`
            <tr><td>${p.fecha}</td><td>${p.proveedor||'—'}</td><td style="font-weight:500">${fmt$(p.precio_por_unidad)}</td></tr>
          `).join('')}
          </tbody>
        </table>
      </div>` : ''}
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarPrecio(${id})">Guardar precio</button>
    </div>
  `);
  ['pp-cant','pp-total'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      const c = parseFloat(document.getElementById('pp-cant').value);
      const t = parseFloat(document.getElementById('pp-total').value);
      document.getElementById('pp-resultado').textContent = (c && t) ? fmt$(t/c) + ' / ' + s.unidad : '—';
    });
  });
}

function guardarPrecio(id) {
  const s    = db.stock.find(x => x.id === id);
  const cant = parseFloat(document.getElementById('pp-cant').value);
  const total= parseFloat(document.getElementById('pp-total').value);
  const fecha= document.getElementById('pp-fecha').value;
  const prov = document.getElementById('pp-prov').value.trim();
  if (!cant || !total || !fecha) { alert('Completá cantidad, precio total y fecha.'); return; }
  if (!s.historial_precios) s.historial_precios = [];
  const entrada = { fecha, proveedor: prov, cantidad_comprada: cant, precio_total: total, precio_por_unidad: Math.round((total/cant)*10000)/10000 };
  s.historial_precios.push(entrada);
  s.precio_actual = entrada;
  saveDB(); closeModal(); renderStock();
  showToast(`Precio actualizado: ${fmt$(entrada.precio_por_unidad)} / ${s.unidad} ✓`);
}

function openFormIngrediente(ing) {
  const es = !!ing;
  window._guardarIng = () => {
    const nombre = document.getElementById('si-nombre').value.trim();
    if (!nombre) return;
    const obj = {
      id: es ? ing.id : Date.now(),
      nombre,
      cantidad:    parseFloat(document.getElementById('si-cant').value) || 0,
      unidad:      document.getElementById('si-unidad').value,
      minimo:      parseFloat(document.getElementById('si-min').value) || 10,
      categoria:   document.getElementById('si-cat').value,
      vencimiento: document.getElementById('si-venc').value || null,
      precio_actual:      es ? (ing.precio_actual || null) : null,
      historial_precios:  es ? (ing.historial_precios || []) : []
    };
    if (es) { const i = db.stock.findIndex(x=>x.id===ing.id); db.stock[i]=obj; }
    else db.stock.push(obj);
    saveDB(); closeModal(); renderStock();
  };

  // Vencimiento badge preview
  const vencActual = es && ing.vencimiento ? ing.vencimiento : '';

  showModal(`
    <div class="modal-title">${es?'Editar ingrediente':'Nuevo ingrediente'}</div>
    <label>Nombre</label>
    <input id="si-nombre" value="${es?ing.nombre:''}" placeholder="Nombre del ingrediente" />
    <div class="grid3 mt12">
      <div><label>Cantidad actual</label><input id="si-cant" type="number" min="0" step="0.1" value="${es?ing.cantidad:''}" placeholder="0" /></div>
      <div><label>Unidad</label><select id="si-unidad">${UNIDADES.map(u=>`<option${es&&ing.unidad===u?' selected':''}>${u}</option>`).join('')}</select></div>
      <div><label>Mínimo (alerta)</label><input id="si-min" type="number" min="0" value="${es?ing.minimo:'10'}" placeholder="10" /></div>
    </div>
    <div class="grid2 mt12">
      <div><label>Categoría</label>
        <select id="si-cat">${CATS_ING.map(c=>`<option${es&&ing.categoria===c?' selected':''}>${c}</option>`).join('')}</select>
      </div>
      <div>
        <label>Fecha de vencimiento</label>
        <input type="date" id="si-venc" value="${vencActual}" />
        <div id="si-venc-preview" style="margin-top:4px;min-height:20px;font-size:12px"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="window._guardarIng()">Guardar</button>
    </div>
  `);

  // Live vencimiento preview
  const vencInput = document.getElementById('si-venc');
  const vencPreview = document.getElementById('si-venc-preview');
  function updateVencPreview() {
    vencPreview.innerHTML = vencInput.value ? vencimientoBadge(vencInput.value) : '';
  }
  vencInput.addEventListener('change', updateVencPreview);
  if (vencActual) updateVencPreview();
}

function reponerIngrediente(id) {
  const s = db.stock.find(x => x.id === id);
  if (!s) return;
  const cant = parseFloat(prompt(`Reponer "${s.nombre}"\nStock actual: ${s.cantidad} ${s.unidad}\n\n¿Cuánto añadís?`));
  if (!cant || isNaN(cant)) return;
  s.cantidad = Math.round((s.cantidad + cant) * 100) / 100;
  saveDB(); renderStock();
}

function eliminarIngrediente(id) {
  if (!confirm('¿Eliminar este ingrediente?')) return;
  db.stock = db.stock.filter(x => x.id !== id);
  saveDB(); renderStock();
}

// ── COSTOS ────────────────────────────────────────────────────────────────
function initCostos() {
  const sel = document.getElementById('costos-receta-sel');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Seleccioná una receta...</option>' +
    db.recetas.map(r => `<option value="${r.id}"${cur==r.id?' selected':''}>${r.nombre}</option>`).join('');
  renderCostos();
}

function renderCostos() {
  const id  = parseInt(document.getElementById('costos-receta-sel').value);
  const cont = document.getElementById('costos-content');
  if (!id) {
    cont.innerHTML = `<div class="empty-state"><div class="empty-icon" style="font-size:32px;margin-bottom:8px">$</div><p>Seleccioná una receta para ver su estructura de costos.</p></div>`;
    return;
  }
  const r = db.recetas.find(x => x.id === id);
  if (!r) return;

  let totalCosto = 0;
  let sinPrecio  = 0;
  const filas = [];

  r.fases.forEach(f => {
    f.ingredientes.forEach(i => {
      const cant = parseFloat(i.cantidad);
      const stockIng = db.stock.find(s => s.nombre.toLowerCase() === i.nombre.toLowerCase());
      const pc = stockIng ? precioActual(stockIng) : null;
      let costoLinea = null;
      if (pc && cant) {
        costoLinea = cant * pc.precio_por_unidad;
        totalCosto += costoLinea;
      } else if (cant) {
        sinPrecio++;
      }
      filas.push({ fase: f.nombre, nombre: i.nombre, cantidad: i.cantidad, unidad: i.unidad, porcentaje: i.porcentaje, precio_unidad: pc ? pc.precio_por_unidad : null, costo: costoLinea, proveedor: pc ? pc.proveedor : null, fecha_precio: pc ? pc.fecha : null });
    });
  });

  const rinde    = parseFloat(r.rendimiento) || 1;
  const costoPorUnidad = totalCosto / rinde;
  const tieneCostos = totalCosto > 0;

  let faseActual = '';
  const filasHTML = filas.map(fi => {
    let faseHdr = '';
    if (fi.fase !== faseActual) { faseActual = fi.fase; faseHdr = `<tr><td colspan="6" style="padding:8px 14px 4px;background:var(--green-xpale)"><span style="font-size:11px;font-weight:500;color:var(--green-mid);text-transform:uppercase;letter-spacing:.07em">${fi.fase}</span></td></tr>`; }
    const pct = tieneCostos && fi.costo ? Math.round(fi.costo/totalCosto*100) : null;
    return faseHdr + `<tr>
      <td>${fi.nombre}</td>
      <td style="color:var(--text-mid)">${fi.cantidad} ${fi.unidad}</td>
      <td style="color:var(--text-mid)">${fi.porcentaje && fi.porcentaje!=='—' ? fi.porcentaje+'%' : '—'}</td>
      <td style="color:var(--green-deep)">${fi.precio_unidad ? fmt$(fi.precio_unidad)+'/'+fi.unidad : '<span style="color:var(--text-light);font-size:12px">Sin precio</span>'}</td>
      <td style="font-weight:${fi.costo?'500':'400'};color:${fi.costo?'var(--text)':'var(--text-light)'}">${fi.costo ? fmt$(fi.costo) : '—'}</td>
      <td>${pct != null ? `<div style="display:flex;align-items:center;gap:6px"><div class="progress-wrap" style="flex:1;width:60px"><div class="progress-fill" style="width:${pct}%;background:var(--green-mid)"></div></div><span style="font-size:11px;color:var(--text-mid)">${pct}%</span></div>` : ''}</td>
    </tr>`;
  }).join('');

  cont.innerHTML = `
    <div class="grid3 mb12" style="grid-template-columns:1fr 1fr 1fr">
      <div class="stat-card">
        <div class="stat-num">${tieneCostos ? fmt$(totalCosto) : '—'}</div>
        <div class="stat-lbl">Costo total (${r.rendimiento} ${r.unidad_rendimiento})</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${tieneCostos ? fmt$(costoPorUnidad) : '—'}</div>
        <div class="stat-lbl">Costo por ${r.unidad_rendimiento}</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:${sinPrecio?'var(--amber)':'var(--green-deep)'}">${sinPrecio}</div>
        <div class="stat-lbl">Ingredientes sin precio</div>
      </div>
    </div>
    ${sinPrecio ? `<div class="alert-banner mb12">⚠ ${sinPrecio} ingrediente${sinPrecio>1?'s':''}  no tienen precio cargado. El costo total está incompleto. Andá a Stock → botón "$ Precio" para actualizarlos.</div>` : ''}
    <div class="card" style="padding:0;overflow:hidden">
      <table class="data-table">
        <thead><tr>
          <th>Ingrediente</th><th>Cantidad</th><th>% en fórmula</th><th>Precio unitario</th><th>Costo</th><th>Peso en costo</th>
        </tr></thead>
        <tbody>${filasHTML}</tbody>
        <tfoot>
          <tr style="background:var(--green-xpale)">
            <td colspan="4" style="font-weight:500;padding:12px 14px">Total</td>
            <td style="font-weight:500;color:var(--green-deep);font-size:15px">${tieneCostos ? fmt$(totalCosto) : '—'}</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>`;
}

// ── FACTURA IMPORT ────────────────────────────────────────────────────────
function importarDesdeFactura() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const raw = JSON.parse(ev.target.result);
        // Acepta tanto objeto único como array de compras
        const compras = Array.isArray(raw) ? raw : [raw];
        if (!compras.every(c => Array.isArray(c.items))) throw new Error('Formato inválido');
        mostrarVistaFacturas(compras);
      } catch(err) {
        showModal(`<div class="modal-title">Error</div><p style="font-size:13px;color:var(--text-mid);margin-bottom:20px">El archivo no es un JSON de factura válido generado por Claude.</p><div class="modal-footer"><button class="btn btn-primary" onclick="closeModal()">Ok</button></div>`);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function mostrarVistaFacturas(compras) {
  // Aplanar ítems preservando el índice de compra (no fecha/proveedor que pueden coincidir)
  let allChecks = [];
  compras.forEach((compra, ci) => {
    compra.items.forEach(item => {
      const match = db.stock.find(s => s.nombre.toLowerCase() === item.nombre.toLowerCase());
      allChecks.push({
        ...item,
        compraIdx: ci,
        fecha: compra.fecha || hoy(),
        proveedor: compra.proveedor || '',
        match: match ? match.id : null,
        agregarAlStock: false
      });
    });
  });

  function buildRows() {
    let html = '';
    compras.forEach((compra, gi) => {
      const itemsDeEstaCompra = allChecks.filter(c => c.compraIdx === gi);
      html += `<tr style="background:var(--green-xpale)">
        <td colspan="6" style="padding:7px 14px">
          <span style="font-size:11px;font-weight:500;color:var(--green-mid);text-transform:uppercase;letter-spacing:.07em">
            Compra ${gi+1} — ${compra.fecha||hoy()}${compra.proveedor?' · '+compra.proveedor:''}
          </span>
          <span style="font-size:11px;color:var(--text-light);margin-left:8px">${itemsDeEstaCompra.length} ítems</span>
        </td>
      </tr>`;
      itemsDeEstaCompra.forEach(c => {
        const globalIdx = allChecks.indexOf(c);
        const stockOpts = '<option value="">— no vincular —</option>' +
          db.stock.map(s => `<option value="${s.id}"${c.match===s.id?' selected':''}>${s.nombre}</option>`).join('');
        const yaEnStock = !!c.match;
        html += `<tr id="frow-${globalIdx}">
          <td style="font-weight:500;font-size:12px">${c.nombre}</td>
          <td style="font-size:12px;white-space:nowrap">${c.cantidad} ${c.unidad}</td>
          <td style="font-size:12px">$${parseFloat(c.precio_total).toLocaleString('es-AR',{minimumFractionDigits:2})}</td>
          <td style="color:var(--green-deep);font-weight:500;font-size:12px;white-space:nowrap">${fmt$(c.precio_total/c.cantidad)}/${c.unidad}</td>
          <td>
            <select style="font-size:11px;padding:3px 6px;width:100%" onchange="
              window._allChecks[${globalIdx}].match=this.value?parseInt(this.value):null;
              window._allChecks[${globalIdx}].agregarAlStock=false;
              document.getElementById('fadd-${globalIdx}').style.display=this.value?'none':'inline-flex';
            ">${stockOpts}</select>
          </td>
          <td>
            <button id="fadd-${globalIdx}" class="btn btn-sm" style="font-size:11px;white-space:nowrap;display:${yaEnStock?'none':'inline-flex'};color:var(--green-mid);border-color:var(--green-mid)"
              onclick="agregarNuevoDesdeFactura(${globalIdx})">
              + Stock
            </button>
          </td>
        </tr>`;
      });
    });
    return html;
  }

  window._allChecks = allChecks;

  window.agregarNuevoDesdeFactura = (idx) => {
    const c = window._allChecks[idx];
    // Mini-modal dentro del modal para definir el ingrediente nuevo
    const miniId = 'mini-' + idx;
    const existingMini = document.getElementById(miniId);
    if (existingMini) { existingMini.remove(); return; }
    const row = document.getElementById('frow-' + idx);
    const mini = document.createElement('tr');
    mini.id = miniId;
    mini.innerHTML = `<td colspan="6" style="background:var(--gold-pale);padding:10px 14px">
      <div style="font-size:12px;font-weight:500;margin-bottom:8px;color:var(--gold)">Agregar "${c.nombre}" al stock</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:6px;align-items:end">
        <div><label style="font-size:11px">Nombre en stock</label><input id="fn-${idx}" value="${c.nombre}" style="font-size:12px"/></div>
        <div><label style="font-size:11px">Cantidad inicial</label><input id="fc-${idx}" type="number" value="${c.cantidad}" style="font-size:12px"/></div>
        <div><label style="font-size:11px">Mínimo (alerta)</label><input id="fm-${idx}" type="number" value="${Math.round(c.cantidad*0.2)}" style="font-size:12px"/></div>
        <div><label style="font-size:11px">Categoría</label>
          <select id="fcat-${idx}" style="font-size:12px">${CATS_ING.map(cat=>`<option>${cat}</option>`).join('')}</select>
        </div>
        <button class="btn btn-sm btn-primary" style="font-size:11px" onclick="confirmarAgregarDesdeFactura(${idx})">Agregar</button>
      </div>
    </td>`;
    row.after(mini);
  };

  window.confirmarAgregarDesdeFactura = (idx) => {
    const c      = window._allChecks[idx];
    const nombre = document.getElementById('fn-'+idx).value.trim();
    const cant   = parseFloat(document.getElementById('fc-'+idx).value) || 0;
    const min    = parseFloat(document.getElementById('fm-'+idx).value) || 0;
    const cat    = document.getElementById('fcat-'+idx).value;
    if (!nombre) return;
    const newIng = {
      id: Date.now() + idx,
      nombre, cantidad: cant, unidad: c.unidad,
      minimo: min, categoria: cat,
      precio_actual: null, historial_precios: []
    };
    db.stock.push(newIng);
    // Vincular automáticamente este check al nuevo ingrediente
    window._allChecks[idx].match = newIng.id;
    window._allChecks[idx].agregarAlStock = true;
    // Actualizar fila visual
    const sel = document.querySelector(`#frow-${idx} select`);
    const opt = document.createElement('option');
    opt.value = newIng.id; opt.textContent = nombre; opt.selected = true;
    sel.appendChild(opt);
    document.getElementById('fadd-'+idx).style.display = 'none';
    document.getElementById('mini-'+idx)?.remove();
    // Actualizar badge contador
    const vinc = window._allChecks.filter(x=>x.match).length;
    const badgeVinc = document.getElementById('badge-vinculados');
    if (badgeVinc) badgeVinc.textContent = vinc + ' vinculados';
  };

  window.confirmarFactura = () => {
    let actualizados = 0;
    window._allChecks.forEach(c => {
      if (!c.match || !c.cantidad || !c.precio_total) return;
      const s = db.stock.find(x => x.id === c.match);
      if (!s) return;
      if (!s.historial_precios) s.historial_precios = [];
      const entrada = {
        fecha: c.fecha,
        proveedor: c.proveedor,
        cantidad_comprada: c.cantidad,
        precio_total: c.precio_total,
        precio_por_unidad: Math.round((c.precio_total / c.cantidad) * 10000) / 10000
      };
      s.historial_precios.push(entrada);
      s.precio_actual = entrada;
      actualizados++;
    });
    saveDB(); closeModal();
    showToast(`${actualizados} ingrediente${actualizados!==1?'s':''} actualizado${actualizados!==1?'s':''} ✓`);
    showView('stock');
  };

  const totalItems = allChecks.length;
  const vinculados = allChecks.filter(c => c.match).length;

  showModal(`
    <div class="modal-title">Importar compras</div>
    <div class="flex mb12" style="gap:8px;flex-wrap:wrap">
      <span class="badge badge-green">${compras.length} compra${compras.length>1?'s':''}</span>
      <span class="badge badge-gray">${totalItems} ítems</span>
      <span id="badge-vinculados" class="badge ${vinculados===totalItems?'badge-green':'badge-amber'}">${vinculados} vinculados</span>
    </div>
    <p style="font-size:12px;color:var(--text-mid);margin-bottom:10px">
      Para cada ítem: vinculalo a un ingrediente existente en el menú desplegable, o usá <strong>+ Stock</strong> para crearlo nuevo ahora mismo.
    </p>
    <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;max-height:440px;overflow-y:auto">
      <table class="data-table" style="table-layout:fixed;width:100%">
        <thead><tr>
          <th style="width:26%">Ítem de factura</th>
          <th style="width:13%">Cant.</th>
          <th style="width:14%">Precio total</th>
          <th style="width:14%">Precio/unid.</th>
          <th style="width:25%">Vincular a stock</th>
          <th style="width:8%"></th>
        </tr></thead>
        <tbody id="factura-tbody">${buildRows()}</tbody>
      </table>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarFactura()">Confirmar e importar</button>
    </div>
  `);
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function renderDashboard() {
  const agotados  = db.stock.filter(s => s.cantidad <= 0).length;
  const bajos     = db.stock.filter(s => s.cantidad > 0 && s.cantidad <= s.minimo).length;
  const hoyMs     = new Date().setHours(0,0,0,0);
  const vencidos  = db.stock.filter(s => s.vencimiento && new Date(s.vencimiento).getTime() < hoyMs);
  const proxVenc  = db.stock.filter(s => s.vencimiento && (() => { const d = Math.round((new Date(s.vencimiento).getTime()-hoyMs)/86400000); return d>=0 && d<=60; })());
  const cats = {};
  db.recetas.forEach(r => { cats[r.categoria] = (cats[r.categoria]||0)+1; });

  document.getElementById('dashboard-content').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:12px">
      <div class="stat-card"><div class="stat-num">${db.recetas.length}</div><div class="stat-lbl">Recetas</div></div>
      <div class="stat-card"><div class="stat-num">${db.stock.length}</div><div class="stat-lbl">Ingredientes</div></div>
      <div class="stat-card"><div class="stat-num" style="color:${bajos?'var(--amber)':'var(--green-deep)'}">${bajos}</div><div class="stat-lbl">Stock bajo</div></div>
      <div class="stat-card"><div class="stat-num" style="color:${agotados?'var(--red)':'var(--green-deep)'}">${agotados}</div><div class="stat-lbl">Agotados</div></div>
      <div class="stat-card"><div class="stat-num" style="color:${vencidos.length?'var(--red)':proxVenc.length?'var(--amber)':'var(--green-deep)'}">${vencidos.length+proxVenc.length}</div><div class="stat-lbl">Vencimientos</div></div>
    </div>
    <div class="grid2">
      <div>
        <div class="card" style="margin-bottom:12px">
          <div style="font-weight:500;margin-bottom:16px">Recetas por categoría</div>
          ${Object.entries(cats).length===0?`<p style="color:var(--text-light);font-size:13px">Sin recetas.</p>`:
            Object.entries(cats).map(([c,n]) => `
            <div style="margin-bottom:12px">
              <div class="flex-between" style="margin-bottom:4px">
                <span style="font-size:13px">${c}</span>
                <span style="font-size:13px;font-weight:500;color:var(--green-deep)">${n}</span>
              </div>
              <div class="progress-wrap">
                <div class="progress-fill" style="width:${Math.round(n/db.recetas.length*100)}%;background:var(--green-mid)"></div>
              </div>
            </div>`).join('')}
        </div>
      </div>
      <div>
        <div class="card" style="margin-bottom:12px">
          <div style="font-weight:500;margin-bottom:16px">Stock a reponer</div>
          ${db.stock.filter(s=>s.cantidad<=s.minimo).length===0
            ? `<p style="color:var(--text-light);font-size:13px">Todo el stock está en orden ✓</p>`
            : db.stock.filter(s=>s.cantidad<=s.minimo).map(s=>`
            <div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:13px">${s.nombre}</span>
              <span class="badge ${s.cantidad<=0?'badge-red':'badge-amber'}">${s.cantidad<=0?'Agotado':'Bajo: '+s.cantidad+' '+s.unidad}</span>
            </div>`).join('')}
        </div>
        ${(vencidos.length+proxVenc.length)>0 ? `
        <div class="card">
          <div style="font-weight:500;margin-bottom:16px">Vencimientos</div>
          ${vencidos.map(s=>`
            <div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:13px">${s.nombre}</span>
              <span class="badge badge-venc-exp">Vencido ${s.vencimiento}</span>
            </div>`).join('')}
          ${proxVenc.map(s=>{
            const dias = Math.round((new Date(s.vencimiento).getTime()-hoyMs)/86400000);
            return `<div class="flex-between" style="padding:8px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:13px">${s.nombre}</span>
              <span class="badge badge-venc-warn">Vence en ${dias}d</span>
            </div>`;
          }).join('')}
        </div>` : ''}
      </div>
    </div>`;
}

// ── BACKUP & IMPORT ───────────────────────────────────────────────────────
function exportarBackup() {
  const fecha = new Date().toISOString().slice(0,10);
  const payload = {
    version: '1.6',
    fecha,
    app: 'LaboratorioNatural',
    recetas:    db.recetas,
    stock:      db.stock,
    produccion: db.produccion || [],
    ventas:     db.ventas || []
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `laboratorio_natural_backup_${fecha}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup exportado correctamente ✓');
}

function importarBackup() {
  document.getElementById('import-file-input').value = '';
  document.getElementById('import-file-input').click();
}

function procesarArchivoImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.recetas || !data.stock) throw new Error('Formato inválido');
      const totalRecetas = data.recetas.length;
      const totalStock   = data.stock.length;
      showModal(`
        <div class="modal-title">Importar backup</div>
        <p style="font-size:13px;color:var(--text-mid);margin-bottom:16px">
          Se encontró un backup del <strong>${data.fecha || 'fecha desconocida'}</strong> con:
        </p>
        <div class="grid2" style="margin-bottom:20px">
          <div class="stat-card" style="text-align:center">
            <div class="stat-num">${totalRecetas}</div>
            <div class="stat-lbl">Recetas</div>
          </div>
          <div class="stat-card" style="text-align:center">
            <div class="stat-num">${totalStock}</div>
            <div class="stat-lbl">Ingredientes en stock</div>
          </div>
        </div>
        <div class="alert-banner" style="background:var(--red-pale);border-color:#e0b0b0;color:var(--red)">
          ⚠ Esto va a <strong>reemplazar</strong> todos tus datos actuales. Esta acción no se puede deshacer.
        </div>
        <p style="font-size:12px;color:var(--text-light);margin-top:8px">
          Tip: si querés conservar lo que tenés, hacé primero un export del estado actual.
        </p>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-danger" onclick="confirmarImport('${encodeURIComponent(JSON.stringify(data))}')">Reemplazar mis datos</button>
        </div>
      `);
    } catch(err) {
      showModal(`
        <div class="modal-title">Error al importar</div>
        <p style="font-size:13px;color:var(--text-mid);margin-bottom:20px">
          El archivo no parece ser un backup válido de Laboratorio Natural.<br>
          Asegurate de importar un archivo <code>.json</code> generado con el botón "Exportar backup".
        </p>
        <div class="modal-footer">
          <button class="btn btn-primary" onclick="closeModal()">Entendido</button>
        </div>
      `);
    }
  };
  reader.readAsText(file);
}

function confirmarImport(encoded) {
  try {
    const data = JSON.parse(decodeURIComponent(encoded));
    db.recetas    = data.recetas;
    db.stock      = data.stock;
    db.produccion = data.produccion || [];
    db.ventas     = data.ventas || [];
    saveDB();
    closeModal();
    showToast(`Backup importado: ${db.recetas.length} recetas, ${db.stock.length} ingredientes ✓`);
    showView('recetas');
  } catch(e) {
    closeModal();
    showToast('Error al importar el backup.');
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function showModal(html) {
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">${html}</div>
    </div>`;
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

document.getElementById('global-search-input').addEventListener('input', function() {
  buscarGlobal(this.value);
});
document.getElementById('global-search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') cerrarBuscadorGlobal();
});
renderRecetas();
